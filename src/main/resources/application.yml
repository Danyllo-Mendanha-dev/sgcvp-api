spring:
  application:
    name: sgcvp
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:sgcvpDB
    #url: jdbc:h2:file:/data/sgcvpDB
    username: sa
    password:
  h2:
    console:
      enabled: true
      #http://localhost:8080/h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show-sql: true
        open-in-view: true

logging:
  level:
    #root: TRACE
    #root: DEBUG
    root: INFO
    #root: WARN
    #root: ERROR
  file:
    name: log/sgcvp.log
    path: /log

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
